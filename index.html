<!DOCTYPE html>
<html>
<head>
    <title>Markerless AR Floor</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_camera;">
        
        <a-assets>
            <img id="tile-img" src="https://i.ibb.co.com/mRVYm6Mv/tiles-image.jpg" crossorigin="anonymous">
        </a-assets>

        <a-entity id="floor-tiles" position="0 -1.5 -5" rotation="-90 0 0">
            <a-plane 
                src="#tile-img" 
                width="6" 
                height="6" 
                repeat="4 4" 
                material="shader: flat;">
            </a-plane>
        </a-entity>

        <a-entity light="type: ambient; intensity: 1.2;"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
