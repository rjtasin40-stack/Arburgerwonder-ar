<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Tiles Floor</title>
    <script src="https://cdn.wonder-ar.com/wonder-ar/latest/wonder-ar.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <wonder-ar-scene>
        <wonder-ar-object 
            type="plane" 
            src="https://i.ibb.co.com/mRVYm6Mv/tiles-image.jpg" 
            position="0 -1.5 -3" 
            rotation="-90 0 0" 
            scale="5 5 5"
            material="repeat: 4 4; wrap: repeat;">
        </wonder-ar-object>
        <wonder-ar-light type="ambient" intensity="1"></wonder-ar-light>
    </wonder-ar-scene>
</body>
</html>
