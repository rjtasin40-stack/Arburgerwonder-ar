<!DOCTYPE html>
<html>
  <head>
    <title>MyWebAR Free Demo</title>
    <!-- A-Frame এবং AR.js লোড -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.2.1/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <!-- AR Scene -->
    <a-scene embedded arjs>
      
      <!-- Marker (hiro ডিফল্ট) -->
      <a-marker preset="hiro">
        <!-- আপনার Google Drive থেকে 3D মডেল -->
        <a-entity gltf-model="https://drive.google.com/uc?export=download&id=1urWo5Os3tEhnvmN20oe5o6xmf6Fqk_YK" 
                  scale="0.5 0.5 0.5" 
                  position="0 0 0">
        </a-entity>
      </a-marker>
      
      <!-- ক্যামেরা -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
