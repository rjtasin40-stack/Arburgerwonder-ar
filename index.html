<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>WebXR Surface Tracking Demo</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      renderer="logarithmicDepthBuffer: true;"
      xr-mode-ui="enabled: true"
      webxr="optionalFeatures: hit-test;">
      
      <!-- 3D Model from Google Drive -->
      <a-entity id="model"
        gltf-model="https://drive.google.com/uc?export=download&id=1urWo5Os3tEhnvmN20oe5o6xmf6Fqk_YK"
        scale="0.5 0.5 0.5"
        visible="false">
      </a-entity>
      
      <a-camera></a-camera>
    </a-scene>

    <script>
      // Surface tracking logic
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener('enter-vr', () => {
        if (sceneEl.xrSession) {
          const model = document.getElementById('model');
          model.setAttribute('visible', 'true');
          // মডেলকে মেঝেতে বসানোর জন্য hit-test ব্যবহার করা হবে
        }
      });
    </script>
  </body>
</html>
