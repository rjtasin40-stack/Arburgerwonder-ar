<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed AR Floor Tiles</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mind-ar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #example-scanning-overlay { display: none; } /* স্ক্যানিং ওভারলে বন্ধ রাখা হলো */
    </style>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiScanning: no;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="tile-texture" src="https://i.ibb.co.com/mRVYm6Mv/tiles-image.jpg" crossorigin="anonymous">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="tiles-parent" position="0 -1.2 -2">
            <a-plane src="#tile-texture" 
                     rotation="-90 0 0" 
                     width="4" 
                     height="4" 
                     repeat="4 4" 
                     material="shader: flat;">
            </a-plane>
        </a-entity>

        <a-light type="ambient" intensity="1"></a-light>
    </a-scene>
</body>
</html>
