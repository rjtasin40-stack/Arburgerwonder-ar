<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fixed AR Floor</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-components.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <img id="tile-texture" src="https://i.ibb.co.com/mRVYm6Mv/tiles-image.jpg" crossorigin="anonymous">
        </a-assets>

        <a-entity id="anchor" position="0 -1.6 -3" rotation="-90 0 0">
            <a-plane 
                src="#tile-texture" 
                width="4" 
                height="4" 
                repeat="4 4" 
                material="shader: flat;">
            </a-plane>
        </a-entity>

        <a-entity camera look-controls="enabled: false"></a-entity>
    </a-scene>

</body>
    </html>
